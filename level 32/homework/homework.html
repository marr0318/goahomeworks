<!-- 1. შექმენი 5 ელემენტი, მიეცი მათ id-ები, შემდეგ კი გასტილე internal css-ის გამოყენებით.
2. შექმენი 5 ელემენტი, მიეცი მათ class-ები, შემდეგ კი გასტილე internal css-ის გამოყენებით.
3. შექმენი 4 ელემენტი, 2 <p> და 2 <h1>, მიეცი მათი ერთი კლასი, თუმცა internal css-ში გასტილე ამ კლასის მქონე მხოლოდ <p>-ები.
4. შექმენი მშობელი ელემენტი <button>, შიგნით კი ჩასვი შვილი ელემენტი <p>, მშობელს გაუწერე სტილი და დააკვირდი რა მოუვა შვილს.
5.  მოიძიე ინფორმაცია external css-ზე, ეცადე გამოიყენო ის შენს html ფაილში. -->

<style>
    #paragraph{
        color: yellow;
    }
    #hh2{
        color: green;
    }
    #aa{
        color: chartreuse;
    }
    #buttton{
        color: cornflowerblue;
    }
    #hh2{
        color: blue;
    }
</style>
<p id="paragraph">hi</p>
<h2 id="hh2">my</h2>
<a id="aa">name</a>
<button id="buttton">is</button>
<h5 id="hh5">mari</h5>

<style>
    .class{
        color: crimson;

    }
</style>
<p class="element">hi</p>
<h1 class="element">my</h1>
<button class="element">surname</button>
<a class="element">is</a>
<h4 class="element">gelashvili</h4>
